<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#fef3e8">
<title>Tra cứu Vật tư · MSC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Serif:ital,wght@1,500&display=swap" rel="stylesheet">
<style>
  :root {
    /* Warm light palette inspired by 热电词典 */
    --bg: #fbf6ed;
    --bg2: #f7efe2;
    --paper: #ffffff;
    --paper2: #fdf9f1;
    --line: #ebe1ce;
    --line2: #d9ccb0;
    --text: #2a2520;
    --text2: #5e554a;
    --text3: #8a7f70;
    --text4: #b4a895;

    /* Accent system — warm orange/amber */
    --accent: #d97706;
    --accent2: #b45309;
    --accent-bg: #fff4e1;
    --accent-line: #fbd6a3;

    /* Highlight (mark) — pale yellow-orange */
    --hl-bg: #ffe7c2;
    --hl-text: #92400e;

    /* Reading green for success/values */
    --ink: #15803d;
    --ink2: #14532d;
    --ink-bg: #ecfdf5;

    /* Red for exclude */
    --red: #b91c1c;
    --red-bg: #fef2f2;
    --red-line: #fecaca;

    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --sans: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    --serif: 'Noto Serif', Georgia, serif;

    --r: 8px;
    --r2: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { overscroll-behavior: none; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 0% 0%, rgba(251, 214, 163, 0.4) 0%, transparent 50%),
      radial-gradient(circle at 100% 0%, rgba(251, 191, 36, 0.12) 0%, transparent 40%);
    background-attachment: fixed;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  /* ======================================================
     TOP BAR — sticky, chứa cả nút tìm kiếm
     ====================================================== */
  .topbar {
    background: rgba(251, 246, 237, 0.92);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border-bottom: 1px solid var(--line);
    padding: 9px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 11px;
    flex-shrink: 0;
  }
  .logo-mark {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, #f97316 0%, #d97706 100%);
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 6px 20px rgba(217, 119, 6, 0.3);
    position: relative;
    overflow: hidden;
  }
  .logo-mark::after {
    content: '热';
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 600;
    font-style: normal;
  }
  .brand-text { line-height: 1.15; min-width: 0; }
  .brand-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.015em;
    color: var(--text);
    display: flex;
    align-items: baseline;
    gap: 6px;
    white-space: nowrap;
  }
  .brand-title .vi-sub {
    font-family: var(--serif);
    font-style: italic;
    color: var(--accent);
    font-weight: 500;
    font-size: 12px;
  }
  .brand-sub {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 2px;
    white-space: nowrap;
  }

  /* Nút TÌM KIẾM trong topbar — gọn vừa */
  .topbar-search {
    background: linear-gradient(135deg, #f97316 0%, #d97706 100%);
    color: #fff;
    border: none;
    border-radius: 9px;
    padding: 0 18px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: transform 0.1s, box-shadow 0.2s, opacity 0.2s;
    box-shadow: 0 3px 12px rgba(217, 119, 6, 0.28);
    margin-left: auto;       /* Đẩy về bên phải, gần stat-mini */
    flex-shrink: 0;
    white-space: nowrap;
  }
  .topbar-search:hover { box-shadow: 0 5px 18px rgba(217, 119, 6, 0.4); }
  .topbar-search:active { transform: translateY(1px); }
  .topbar-search:disabled { opacity: 0.55; cursor: not-allowed; }
  .topbar-search .spinner {
    width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .topbar-search.loading .spinner { display: block; }
  .topbar-search.loading .btn-txt { display: none; }
  .topbar-search.loading::after {
    content: 'Đang tìm...';
    font-size: 12.5px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .stat-mini {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--text2);
    background: var(--paper);
    border: 1px solid var(--line);
    padding: 5px 11px;
    border-radius: 20px;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 7px;
    box-shadow: 0 1px 2px rgba(120, 80, 30, 0.04);
    flex-shrink: 0;
  }
  .stat-mini::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--ink);
    box-shadow: 0 0 8px rgba(21, 128, 61, 0.5);
    animation: pulse 2.4s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
  .stat-mini b { color: var(--accent); font-weight: 700; }
  .stat-mini .stat-label { color: var(--text3); font-size: 9.5px; letter-spacing: 0.06em; }

  /* ======================================================
     SEARCH PANEL — 4 columns × 5 rows, no labels
     ====================================================== */
  .panel {
    padding: 16px 16px 0;
  }
  .columns {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .col {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r2);
    padding: 9px;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 1px 2px rgba(120, 80, 30, 0.03);
    position: relative;
  }
  .col::before {
    content: '';
    position: absolute;
    top: 9px; left: 9px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.5;
  }
  .col.exclude::before { background: var(--red); }

  .col:focus-within {
    border-color: var(--accent-line);
    box-shadow: 0 4px 14px rgba(217, 119, 6, 0.1);
  }
  .col.exclude:focus-within {
    border-color: var(--red-line);
    box-shadow: 0 4px 14px rgba(185, 28, 28, 0.08);
  }

  .field-input {
    width: 100%;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13.5px;
    padding: 7px 10px 7px 18px;
    margin-bottom: 3px;
    outline: none;
    transition: all 0.15s;
    height: 32px;
    font-weight: 500;
  }
  .field-input:last-child { margin-bottom: 0; }
  .field-input::placeholder {
    color: var(--text4);
    font-size: 12.5px;
    font-weight: 400;
    font-style: italic;
  }
  .field-input:focus {
    background: var(--accent-bg);
    border-color: var(--accent-line);
  }
  .col.exclude .field-input:focus {
    background: var(--red-bg);
    border-color: var(--red-line);
  }
  .field-input:not(:placeholder-shown) {
    background: var(--paper2);
    border-color: var(--line);
  }
  .col:not(.exclude) .field-input:not(:placeholder-shown) {
    color: var(--accent2);
    font-weight: 600;
  }
  .col.exclude .field-input:not(:placeholder-shown) {
    color: var(--red);
    font-weight: 600;
  }

  /* ======================================================
     ACTION BAR — chỉ còn limit + utilities
     ====================================================== */
  .action-bar {
    display: flex;
    gap: 8px;
    padding: 10px 16px 0;
    align-items: center;
    justify-content: flex-end;
  }
  .action-bar .info-text {
    flex: 1;
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--text3);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .meta-input {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 0 10px;
    height: 38px;
    text-align: center;
    width: 70px;
    outline: none;
    transition: border-color 0.15s;
  }
  .meta-input:focus { border-color: var(--accent-line); }

  .icon-btn {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r);
    color: var(--text2);
    height: 38px;
    width: 38px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-family: var(--mono);
  }
  .icon-btn:hover { border-color: var(--accent-line); color: var(--accent); background: var(--accent-bg); }
  .icon-btn:active { transform: scale(0.95); }

  /* ======================================================
     RESULTS BAR
     ====================================================== */
  .results-bar {
    padding: 18px 16px 10px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
  }
  .results-info {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--text3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .results-info b {
    color: var(--accent);
    font-size: 22px;
    font-family: var(--sans);
    font-weight: 700;
    letter-spacing: -0.02em;
    text-transform: none;
  }
  .results-info-divider {
    color: var(--text4);
    margin: 0 4px;
  }
  .results-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text4);
    letter-spacing: 0.05em;
  }

  /* ======================================================
     RESULT TABLE — content-based widths, scroll on overflow
     ====================================================== */
  .table-wrap {
    margin: 0 16px 100px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r2);
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(120, 80, 30, 0.06);
  }
  .table-scroll {
    overflow-x: auto;
    overflow-y: visible;
    max-width: 100%;
  }
  .table-scroll::-webkit-scrollbar { height: 10px; width: 10px; }
  .table-scroll::-webkit-scrollbar-track { background: var(--paper2); }
  .table-scroll::-webkit-scrollbar-thumb {
    background: var(--line2); border-radius: 5px;
    border: 2px solid var(--paper2);
  }
  .table-scroll::-webkit-scrollbar-thumb:hover { background: var(--accent-line); }

  table {
    border-collapse: collapse;
    font-size: 13px;
    width: 100%;
    table-layout: auto;
  }
  thead {
    background: linear-gradient(to bottom, var(--accent-bg) 0%, var(--bg2) 100%);
    position: sticky;
    top: 0;
    z-index: 5;
  }
  thead th {
    padding: 13px 14px;
    text-align: left;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--accent2);
    text-transform: uppercase;
    white-space: nowrap;
    border-bottom: 2px solid var(--accent-line);
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
    vertical-align: middle;
  }
  thead th:hover { background: var(--accent-bg); }
  thead th.sorted { color: var(--accent); background: rgba(251, 191, 36, 0.15); }
  thead th .sort-i { margin-left: 5px; opacity: 0.4; font-size: 9px; }
  thead th.sorted .sort-i { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid var(--line);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:nth-child(even) { background: var(--paper2); }
  tbody tr:hover { background: var(--accent-bg) !important; }

  tbody td {
    padding: 11px 13px;
    color: var(--text);
    vertical-align: top;
    line-height: 1.5;
    word-wrap: break-word;
    overflow-wrap: break-word;
    white-space: pre-wrap;       /* GIỮ \n từ database */
  }
  td.num {
    width: 38px;
    text-align: center;
    font-family: var(--mono);
    color: var(--text4);
    font-size: 11px;
    font-weight: 500;
    background: var(--paper2);
    white-space: nowrap;
  }
  td.mono {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--text2);
    white-space: nowrap;
  }
  td.price {
    font-family: var(--mono);
    font-size: 12.5px;
    font-weight: 700;
    color: var(--ink);
    text-align: right;
    white-space: nowrap;
  }
  td.price.warm { color: var(--accent); }
  td.empty { color: var(--text4); font-style: italic; font-size: 11px; white-space: nowrap; }

  /* Sticky columns — Tên gói + Danh mục cố định khi scroll ngang */
  thead th.col-tengoi-th,
  tbody td.col-tengoi {
    position: sticky;
    left: 38px;       /* sau cột # */
    z-index: 3;
    background: var(--paper);
    box-shadow: 1px 0 0 var(--line);
  }
  tbody tr:nth-child(even) td.col-tengoi { background: var(--paper2); }
  tbody tr:hover td.col-tengoi { background: var(--accent-bg) !important; }
  thead th.col-tengoi-th {
    z-index: 6;
    background: linear-gradient(to bottom, var(--accent-bg) 0%, var(--bg2) 100%);
  }

  thead th.col-danhmuc-th,
  tbody td.col-danhmuc {
    position: sticky;
    z-index: 2;
    background: var(--paper);
    box-shadow: 1px 0 0 var(--line);
  }
  tbody tr:nth-child(even) td.col-danhmuc { background: var(--paper2); }
  tbody tr:hover td.col-danhmuc { background: var(--accent-bg) !important; }
  thead th.col-danhmuc-th {
    z-index: 5;
    background: linear-gradient(to bottom, var(--accent-bg) 0%, var(--bg2) 100%);
  }

  /* Cột # cũng sticky */
  thead th.num-th,
  tbody td.num {
    position: sticky;
    left: 0;
    z-index: 4;
  }
  thead th.num-th {
    z-index: 7;
    background: linear-gradient(to bottom, var(--accent-bg) 0%, var(--bg2) 100%);
  }

  /* Specific column widths — chặt hơn để giá lên trước */
  .col-tengoi   { min-width: 220px; max-width: 320px; }
  .col-danhmuc  { min-width: 160px; max-width: 240px; }
  .col-cauhinh  { min-width: 200px; max-width: 320px; }
  .col-hangsx, .col-nhanhieu { min-width: 110px; max-width: 170px; }
  .col-xuatxu   { min-width: 90px;  max-width: 150px; }
  .col-kymahieu { min-width: 110px; max-width: 180px; white-space: pre-wrap; }
  .col-namsx    { min-width: 60px;  max-width: 80px;  }
  .col-dvt      { min-width: 50px;  max-width: 70px;  }
  .col-kl       { min-width: 50px;  max-width: 70px;  }

  td.col-tengoi { font-size: 12.5px; }
  td.col-tengoi .head {
    font-weight: 600;
    color: var(--text);
    display: block;
    margin-bottom: 4px;
    line-height: 1.45;
  }
  td.col-tengoi .meta {
    display: block;
    font-size: 11px;
    color: var(--text2);
    line-height: 1.55;
    padding-left: 8px;
    border-left: 2px solid var(--accent-line);
    margin-top: 2px;
  }
  td.col-tengoi .meta-key {
    color: var(--text3);
    font-weight: 500;
    font-size: 10.5px;
    margin-right: 3px;
    text-transform: lowercase;
    font-variant: all-small-caps;
    letter-spacing: 0.04em;
  }

  td.col-cauhinh { font-size: 12px; line-height: 1.5; }
  td.col-cauhinh .head {
    display: block;
    color: var(--text);
  }

  mark {
    background: var(--hl-bg);
    color: var(--hl-text);
    border-radius: 3px;
    padding: 1px 3px;
    font-weight: 600;
    font-style: normal;
    box-shadow: 0 1px 0 rgba(217, 119, 6, 0.15);
  }

  /* ======================================================
     PLACEHOLDER & ERROR
     ====================================================== */
  .placeholder {
    padding: 80px 30px;
    text-align: center;
    color: var(--text2);
  }
  .placeholder-mark {
    width: 64px; height: 64px;
    margin: 0 auto 20px;
    border: 1.5px dashed var(--accent-line);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
    font-size: 26px;
    font-family: var(--serif);
    background: var(--paper);
  }
  .placeholder-title {
    font-size: 17px;
    color: var(--text);
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .placeholder-sub {
    font-size: 12.5px;
    color: var(--text2);
    line-height: 1.8;
    max-width: 360px;
    margin: 0 auto;
  }
  .placeholder-sub kbd {
    font-family: var(--mono);
    background: var(--paper);
    border: 1px solid var(--line);
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 10.5px;
    color: var(--accent);
    font-weight: 600;
    box-shadow: 0 1px 0 var(--line2);
  }

  .err {
    background: var(--red-bg);
    border: 1px solid var(--red-line);
    border-radius: var(--r);
    padding: 11px 16px;
    color: var(--red);
    font-size: 12.5px;
    margin: 12px 16px;
    font-family: var(--mono);
    display: flex;
    gap: 10px;
    align-items: center;
  }

  /* ======================================================
     RESPONSIVE
     ====================================================== */
  @media (max-width: 900px) {
    .columns { grid-template-columns: repeat(2, 1fr); }
    .panel { padding: 14px 12px 0; }
  }
  @media (max-width: 520px) {
    body { font-size: 13.5px; }
    .topbar { padding: 8px 10px; gap: 8px; }
    .brand { gap: 8px; }
    .brand-text { display: none; }    /* Mobile: chỉ giữ logo để tiết kiệm chỗ */
    .logo-mark { width: 34px; height: 34px; }
    .logo-mark::after { font-size: 16px; }
    .topbar-search { height: 34px; font-size: 12.5px; padding: 0 14px; }
    .stat-mini { font-size: 10px; padding: 4px 8px; }
    .stat-mini .stat-label { display: none; }

    .panel { padding: 10px 10px 0; }
    .columns { grid-template-columns: 1fr; gap: 8px; }
    .col { padding: 8px; }
    .field-input { font-size: 13px; height: 30px; padding: 6px 9px 6px 16px; }

    .action-bar { padding: 8px 10px 0; }
    .action-bar .info-text { display: none; }
    .icon-btn:nth-child(4) { display: none; }
    .meta-input, .icon-btn { height: 36px; }

    .results-bar { padding: 12px 12px 6px; }
    .results-info b { font-size: 19px; }

    .table-wrap { margin: 0 10px 80px; border-radius: 10px; }
    table { font-size: 12.5px; }
    thead th { padding: 11px 11px; font-size: 9.5px; }
    tbody td { padding: 10px 11px; }
    td.num { width: 32px; font-size: 10.5px; padding: 10px 4px; }

    .col-tengoi   { min-width: 180px; max-width: 240px; }
    .col-danhmuc  { min-width: 130px; max-width: 200px; }
    .col-cauhinh  { min-width: 180px; max-width: 280px; }
    td.col-tengoi { font-size: 12px; }
    td.col-tengoi .meta { font-size: 10.5px; }
    td.col-cauhinh { font-size: 11.5px; }
    .col-namsx, .col-dvt, .col-kl { min-width: 44px; max-width: 60px; }

    /* Sticky col-tengoi: left = 32px (width cột # mobile) */
    thead th.col-tengoi-th, tbody td.col-tengoi { left: 32px; }
    thead th.num-th, tbody td.num { left: 0; }
  }
  @media (max-width: 380px) {
    .topbar { padding: 7px 8px; }
    .topbar-search { font-size: 12.5px; padding: 0 10px; }
    .topbar-search .btn-txt::after { content: ''; }
    .stat-mini { padding: 3px 7px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="logo-mark"></div>
    <div class="brand-text">
      <div class="brand-title">物资查询 <span class="vi-sub">tra cứu</span></div>
      <div class="brand-sub">MSC · TENDER DB</div>
    </div>
  </div>

<script>
// ============================================================
// CONFIG
// ============================================================
const CF_WORKER_URL = 'https://danhmuc-search.han280190.workers.dev';

const RESULT_COLS = [
  { key: 'ten_goi',                                                 label: 'Tên gói',           cls: 'col-tengoi'  },
  { key: 'stt',                                                     label: 'STT',               cls: 'mono'        },
  { key: 'danh_muc_hang_hoa',                                       label: 'Danh mục',          cls: 'col-danhmuc' },
  { key: 'ky_ma_hieu',                                              label: 'Ký mã hiệu',        cls: 'col-kymahieu' },
  { key: 'nhan_hieu',                                               label: 'Nhãn hiệu',         cls: 'col-nhanhieu' },
  { key: 'nam_san_xuat',                                            label: 'Năm SX',            cls: 'mono col-namsx' },
  { key: 'xuat_xu_quoc_gia_vung_lanh_tho_san_xuat',                 label: 'Xuất xứ',           cls: 'col-xuatxu'  },
  { key: 'hang_san_xuat',                                           label: 'Hãng SX',           cls: 'col-hangsx'  },
  { key: 'cau_hinh_tinh_nang_ky_thuat_co_ban',                      label: 'Cấu hình KT',       cls: 'col-cauhinh' },
  { key: 'don_vi_tinh',                                             label: 'ĐVT',               cls: 'mono col-dvt' },
  { key: 'khoi_luong',                                              label: 'KL',                cls: 'mono col-kl' },
  { key: 'xuat_xu_2',                                               label: 'Xuất xứ chi tiết',  cls: 'col-xuatxu'  },
  { key: 'don_gia_du_thau_da_bao_gom_thue_phi_le_phi_neu_co',       label: 'Đơn giá',           cls: 'price'       },
  { key: 'thanh_tien_da_bao_gom_thue_phi_le_phi_neu_co',            label: 'Thành tiền',        cls: 'price warm'  },
  { key: 'time_cap',                                                label: 'Time cấp',          cls: 'mono'        }
];

let lastResults = [];
let lastKws = [];
let sortState = { col: null, asc: true };

// ============================================================
// NORMALIZATION — bỏ dấu, bỏ khoảng trắng, lowercase
// ============================================================
// Dùng Unicode Normalization (NFD) để tách ký tự + dấu, rồi xoá dấu
function stripVietnameseTones(str) {
  if (!str) return '';
  return String(str)
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')   // dấu thanh + dấu phụ
    .replace(/đ/g, 'd').replace(/Đ/g, 'D');
}

// Chuẩn hoá triệt để: lowercase + bỏ dấu + bỏ mọi khoảng trắng/dấu chấm/gạch
// "Cảm biến" → "cambien"; "Cam Bien" → "cambien"; "cảm-biến" → "cambien"
function normalizeStrong(str) {
  return stripVietnameseTones(str)
    .toLowerCase()
    .replace(/[\s\-_.,;:/\\()[\]{}'"]+/g, '');   // xoá hết whitespace + ký tự ngăn
}

// Chuẩn hoá nhẹ (giữ khoảng trắng) — dùng cho highlight
function normalizeSoft(str) {
  return stripVietnameseTones(String(str)).toLowerCase();
}

// ============================================================
// HELPERS
// ============================================================
function readGroup(cls) {
  return Array.from(document.querySelectorAll('.field-input.' + cls))
    .map(el => el.value.trim())
    .filter(Boolean);
}

function fmtVND(v) {
  if (v === null || v === undefined || v === '') return '';
  const n = Number(String(v).replace(/[^\d.-]/g, ''));
  if (!isFinite(n) || n === 0) return String(v);
  return n.toLocaleString('vi-VN');
}

function escapeHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// HIGHLIGHT — match diacritic-insensitive bằng cách tạo regex từ phiên bản đã normalize
function highlight(text, kws) {
  if (!text) return '';
  const safeText = escapeHtml(text);
  if (!kws.length) return safeText;

  // Với mỗi ký tự trong text gốc, lấy ký tự đã normalize tương ứng
  // Sau đó tìm vị trí khớp trong chuỗi normalize, map về vị trí gốc
  const original = String(text);
  const normalized = normalizeSoft(original);  // giữ khoảng trắng

  // Build mapping: vị trí trong normalized → vị trí trong original
  // (vì độ dài có thể khác do NFD tách ký tự)
  // Đơn giản hóa: làm normalize từng ký tự, build map
  const charMap = []; // charMap[i] = original index của normalized char thứ i
  let oi = 0;
  for (let i = 0; i < original.length; i++) {
    const norm = normalizeSoft(original[i]);
    for (let j = 0; j < norm.length; j++) {
      charMap.push(i);
    }
  }

  // Sort kws dài trước
  const sorted = [...new Set(kws)].sort((a, b) => b.length - a.length);

  // Tìm tất cả khoảng cần highlight (start, end) trong original
  const ranges = [];
  sorted.forEach(kw => {
    const nkw = normalizeSoft(kw);
    if (!nkw) return;
    let pos = 0;
    while (pos < normalized.length) {
      const found = normalized.indexOf(nkw, pos);
      if (found === -1) break;
      const startOrig = charMap[found];
      const endOrig = charMap[found + nkw.length - 1] + 1;
      if (startOrig !== undefined && endOrig !== undefined) {
        ranges.push([startOrig, endOrig]);
      }
      pos = found + 1;
    }
  });

  if (!ranges.length) return safeText;

  // Merge overlapping ranges
  ranges.sort((a, b) => a[0] - b[0]);
  const merged = [ranges[0]];
  for (let i = 1; i < ranges.length; i++) {
    const last = merged[merged.length - 1];
    if (ranges[i][0] <= last[1]) {
      last[1] = Math.max(last[1], ranges[i][1]);
    } else {
      merged.push(ranges[i]);
    }
  }

  // Build kết quả với <mark>
  let result = '';
  let cursor = 0;
  merged.forEach(([s, e]) => {
    result += escapeHtml(original.substring(cursor, s));
    result += '<mark>' + escapeHtml(original.substring(s, e)) + '</mark>';
    cursor = e;
  });
  result += escapeHtml(original.substring(cursor));
  return result;
}

// Format cột Tên gói: tách tiêu đề và các meta line "_..."
function formatTenGoi(text, kws) {
  if (!text) return '';
  // Chuẩn hoá xuống dòng
  const lines = String(text).split(/\n+/).map(l => l.trim()).filter(Boolean);
  if (!lines.length) return '';

  // Dòng đầu là tiêu đề
  const head = highlight(lines[0], kws);
  if (lines.length === 1) return `<span class="head">${head}</span>`;

  // Các dòng còn lại: "_key: value" hoặc text thường
  const meta = lines.slice(1).map(line => {
    // Bỏ dấu "_" đầu dòng
    const clean = line.replace(/^_+/, '').trim();
    const m = clean.match(/^([^:]+):\s*(.+)$/);
    if (m) {
      const key = highlight(m[1].trim(), kws);
      const val = highlight(m[2].trim(), kws);
      return `<span class="meta"><span class="meta-key">${key}:</span>${val}</span>`;
    }
    return `<span class="meta">${highlight(clean, kws)}</span>`;
  }).join('');

  return `<span class="head">${head}</span>${meta}`;
}

// ============================================================
// LOAD COUNT
// ============================================================
async function loadCount() {
  try {
    const res = await fetch(CF_WORKER_URL + '/count');
    if (res.ok) {
      const body = await res.json();
      if (body.count !== undefined) {
        document.getElementById('total-count').textContent =
          Number(body.count).toLocaleString('vi-VN');
        return;
      }
    }
  } catch(e) {}
  document.getElementById('total-count').textContent = '●';
}

// ============================================================
// SEARCH
// ============================================================
async function doSearch() {
  const a = readGroup('ex');
  const b = readGroup('g1');
  const c = readGroup('g2');
  const d = readGroup('g3');

  if (!b.length && !c.length && !d.length) {
    showError('Cần ít nhất 1 từ khoá ở cột 2, 3 hoặc 4');
    return;
  }

  const limit = Math.min(parseInt(document.getElementById('limit').value) || 200, 2000);

  // CHIẾN LƯỢC: Gửi token đặc trưng nhất (dài nhất, không dấu) lên Worker để
  // thu hẹp tập kết quả thô, sau đó lọc chính xác bằng normalize ở client.
  // Nếu từ khoá không có dấu hoặc đã đúng dạng, server LIKE sẽ match như thường.
  // Nếu user gõ "cam bien", server tìm "cam" → match cả "cảm biến" vì "cảm biến"
  //   chứa "cam" nếu data có lưu "cảm biến" KHÔNG dấu? Không, server có dấu.
  // → Phải lấy nhiều dữ liệu hơn rồi lọc client.
  //
  // Cách hiện thực: gửi LẦN LƯỢT từng token chính của từ khoá lên server,
  // server trả về union → client filter chính xác bằng normalizeStrong.

  // Lấy token đặc trưng nhất từ mỗi nhóm để query server (dùng OR rộng)
  // Nếu user gõ "cam bien", token = ["cam", "bien"] — gửi 1 token thôi cho rộng
  function pickServerToken(groupKws) {
    // Lấy từ ngắn nhất ≥ 3 ký tự, không dấu — dễ match LIKE
    const tokens = [];
    groupKws.forEach(kw => {
      // Tách thành các từ
      const words = stripVietnameseTones(kw).toLowerCase().split(/[\s\-_.,;:/\\]+/).filter(w => w.length >= 2);
      if (words.length) {
        // Lấy từ dài nhất (đặc trưng nhất)
        words.sort((a, b) => b.length - a.length);
        tokens.push(words[0]);
      }
    });
    return tokens;
  }

  // Server-side query: gửi token KHÔNG DẤU — vì DB có thể có data lẫn lộn
  // Hiện tại Worker LIKE search trên cột search_text (đã có dấu), nên ta gửi
  // cả 2 phiên bản: có dấu (nếu user gõ có dấu) và không dấu để bao quát.
  const parts = [];

  // Cho mỗi nhóm, gửi từ khoá GỐC user nhập (server LIKE search)
  // Server trả về tất cả dòng có chứa bất kỳ kw nào trong nhóm (OR)
  // Client sau đó lọc lại với normalize cho chính xác
  b.forEach(k => parts.push('g1=' + encodeURIComponent(k)));
  c.forEach(k => parts.push('g2=' + encodeURIComponent(k)));
  d.forEach(k => parts.push('g3=' + encodeURIComponent(k)));
  // Loại trừ chỉ áp dụng client-side để chính xác

  // Lấy nhiều dữ liệu hơn limit hiển thị để client filter có chỗ
  parts.push('limit=' + Math.min(limit * 5, 5000));
  parts.push('cols=' + RESULT_COLS.map(c => c.key).concat(['search_text']).join(','));

  const url = CF_WORKER_URL + '/search?' + parts.join('&');

  const btn = document.getElementById('search-btn');
  btn.disabled = true;
  btn.classList.add('loading');
  clearError();

  const t0 = performance.now();
  try {
    let serverData = [];
    let serverMs = null;

    try {
      const res = await fetch(url);
      if (res.ok) {
        const body = await res.json();
        if (body.data) {
          serverData = body.data;
          serverMs = body.elapsed;
        }
      }
    } catch(e) { /* sẽ retry với fallback */ }

    // Nếu server trả ít hoặc 0 (vì user gõ không dấu mà DB có dấu),
    // thử lại bằng cách query với token không dấu — nhưng server LIKE cũng có dấu nên có thể không giúp.
    // Fallback: nếu kết quả < limit, thử query với 1 token rộng nhất từ mỗi nhóm
    if (serverData.length < 50 && (b.length || c.length || d.length)) {
      const altParts = [];
      const allGroups = [b, c, d];
      const allGroupKeys = ['g1', 'g2', 'g3'];
      let hasAlt = false;
      allGroups.forEach((grp, idx) => {
        if (!grp.length) return;
        // Mỗi từ trong nhóm → tạo các biến thể không dấu
        const variants = new Set();
        grp.forEach(kw => {
          variants.add(kw);                                    // gốc
          variants.add(stripVietnameseTones(kw));              // bỏ dấu
          variants.add(stripVietnameseTones(kw).toLowerCase());
          // Tách từng word, dùng word dài nhất
          const words = stripVietnameseTones(kw).toLowerCase().split(/\s+/).filter(w => w.length >= 3);
          words.forEach(w => variants.add(w));
        });
        variants.forEach(v => {
          if (v && v.length >= 2) {
            altParts.push(allGroupKeys[idx] + '=' + encodeURIComponent(v));
            hasAlt = true;
          }
        });
      });

      if (hasAlt) {
        altParts.push('limit=' + Math.min(limit * 5, 5000));
        altParts.push('cols=' + RESULT_COLS.map(c => c.key).concat(['search_text']).join(','));
        const altUrl = CF_WORKER_URL + '/search?' + altParts.join('&');
        try {
          const res2 = await fetch(altUrl);
          if (res2.ok) {
            const body2 = await res2.json();
            if (body2.data && body2.data.length > serverData.length) {
              serverData = body2.data;
              if (body2.elapsed) serverMs = (serverMs || 0) + body2.elapsed;
            }
          }
        } catch(e) {}
      }
    }

    // ===== CLIENT-SIDE FILTER =====
    // Logic giống Excel: B,C,D giữa các nhóm là AND; trong cùng nhóm là OR.
    // A là loại trừ.
    // Tất cả so khớp dùng normalizeStrong (bỏ dấu, bỏ space, lowercase).
    const groups = [b, c, d].filter(g => g.length);
    const filtered = serverData.filter(row => {
      // Build search text — gộp các trường text để search
      const haystack = normalizeStrong(
        [
          row.search_text || '',
          row.ten_goi || '',
          row.danh_muc_hang_hoa || '',
          row.ky_ma_hieu || '',
          row.nhan_hieu || '',
          row.hang_san_xuat || '',
          row.cau_hinh_tinh_nang_ky_thuat_co_ban || '',
          row.xuat_xu_quoc_gia_vung_lanh_tho_san_xuat || '',
          row.xuat_xu_2 || '',
          row.nam_san_xuat || ''
        ].join(' ')
      );

      // Phải match TẤT CẢ các nhóm B,C,D (AND)
      const allGroupsMatch = groups.every(grp => {
        // Trong 1 nhóm, chỉ cần match 1 từ khoá (OR)
        return grp.some(kw => haystack.includes(normalizeStrong(kw)));
      });
      if (!allGroupsMatch) return false;

      // Không được chứa bất kỳ từ trong A (loại trừ)
      const noExclude = !a.some(kw => haystack.includes(normalizeStrong(kw)));
      return noExclude;
    });

    // Cắt theo limit
    const finalData = filtered.slice(0, limit);

    const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
    lastResults = finalData;
    lastKws = [...b, ...c, ...d];
    renderTable(finalData, elapsed, serverMs);
  } catch(e) {
    showError('Lỗi kết nối: ' + e.message);
  }

  btn.disabled = false;
  btn.classList.remove('loading');
}

// ============================================================
// RENDER TABLE
// ============================================================
function renderTable(data, elapsed, serverMs) {
  const info = document.getElementById('results-info');
  const time = document.getElementById('results-time');
  const out  = document.getElementById('results-container');

  info.innerHTML = `<b>${data.length.toLocaleString('vi-VN')}</b> kết quả`;
  time.textContent = (serverMs ? `server ${serverMs}ms · ` : '') + `total ${elapsed}s`;

  if (!data.length) {
    out.innerHTML = `
      <div class="placeholder">
        <div class="placeholder-mark">⊘</div>
        <div class="placeholder-title">Không có kết quả</div>
        <div class="placeholder-sub">Thử bỏ bớt điều kiện hoặc thay đổi từ khoá</div>
      </div>`;
    return;
  }

  let head = '<tr><th class="num-th">#</th>';
  RESULT_COLS.forEach(col => {
    const sorted = sortState.col === col.key;
    let thCls = sorted ? 'sorted ' : '';
    if (col.key === 'ten_goi') thCls += 'col-tengoi-th col-tengoi';
    else if (col.key === 'danh_muc_hang_hoa') thCls += 'col-danhmuc-th col-danhmuc';
    else thCls += col.cls;
    head += `<th class="${thCls.trim()}" onclick="sortBy('${col.key}')">${col.label}<span class="sort-i">${sorted ? (sortState.asc ? '▲' : '▼') : '↕'}</span></th>`;
  });
  head += '</tr>';

  let rows = '';
  data.forEach((row, i) => {
    rows += `<tr>`;
    rows += `<td class="num">${i + 1}</td>`;
    RESULT_COLS.forEach(col => {
      const raw = row[col.key];
      const isPrice = col.cls.includes('price');
      const isEmpty = raw === null || raw === undefined || raw === '';

      if (isEmpty) {
        rows += `<td class="empty">—</td>`;
      } else if (isPrice) {
        rows += `<td class="${col.cls}">${fmtVND(raw)}</td>`;
      } else if (col.key === 'ten_goi') {
        // Tách tiêu đề và meta cho dễ đọc
        rows += `<td class="${col.cls}">${formatTenGoi(String(raw), lastKws)}</td>`;
      } else {
        const highlighted = highlight(String(raw), lastKws);
        rows += `<td class="${col.cls}">${highlighted}</td>`;
      }
    });
    rows += `</tr>`;
  });

  out.innerHTML = `
    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>${head}</thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;

  // Tính left động cho cột Danh mục sticky (sau cột # + cột Tên gói)
  requestAnimationFrame(() => {
    const tengoi = out.querySelector('th.col-tengoi-th');
    if (!tengoi) return;
    const left = 38 + tengoi.offsetWidth; // 38 = width cột #
    out.querySelectorAll('th.col-danhmuc-th, td.col-danhmuc').forEach(el => {
      el.style.left = left + 'px';
    });
  });
}

// ============================================================
// SORT
// ============================================================
function sortBy(key) {
  if (sortState.col === key) sortState.asc = !sortState.asc;
  else { sortState.col = key; sortState.asc = true; }

  const sorted = [...lastResults].sort((a, b) => {
    let va = a[key] ?? '', vb = b[key] ?? '';
    const na = Number(String(va).replace(/[^\d.-]/g, ''));
    const nb = Number(String(vb).replace(/[^\d.-]/g, ''));
    if (!isNaN(na) && !isNaN(nb) && va !== '' && vb !== '') {
      return sortState.asc ? na - nb : nb - na;
    }
    va = String(va); vb = String(vb);
    if (va < vb) return sortState.asc ? -1 : 1;
    if (va > vb) return sortState.asc ? 1 : -1;
    return 0;
  });

  const t = document.getElementById('results-time').textContent;
  const m = t.match(/server (\d+)ms/);
  renderTable(sorted, '0', m ? m[1] : null);
}

// ============================================================
// EXPORT CSV
// ============================================================
function exportCSV() {
  if (!lastResults.length) {
    showError('Chưa có kết quả để xuất');
    return;
  }
  const headers = RESULT_COLS.map(c => c.label);
  const csvRows = [headers.join(',')];
  lastResults.forEach(row => {
    const r = RESULT_COLS.map(col => {
      const v = String(row[col.key] ?? '').replace(/"/g, '""');
      return `"${v}"`;
    });
    csvRows.push(r.join(','));
  });
  const csv = '\ufeff' + csvRows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `tracuu_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function clearAll() {
  document.querySelectorAll('.field-input').forEach(el => el.value = '');
  document.querySelector('.field-input.g1').focus();
}

// ============================================================
// ERRORS
// ============================================================
function showError(msg) {
  clearError();
  const c = document.getElementById('results-container');
  const err = document.createElement('div');
  err.className = 'err';
  err.id = 'err-msg';
  err.innerHTML = `<span style="font-size:14px">⚠</span> ${msg}`;
  c.prepend(err);
}
function clearError() {
  document.getElementById('err-msg')?.remove();
}

// ============================================================
// KEY HANDLERS
// ============================================================
document.querySelectorAll('.field-input, #limit').forEach(el => {
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      el.blur();
      doSearch();
    }
  });
});

loadCount();
</script>
